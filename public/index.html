<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#2D5A3D" />
  <meta name="description" content="ImmoTrack — Gestion locative simplifiée" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>ImmoTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bouton de secours — visible uniquement quand l'app est bloquée */
    #emergency-logout {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99999;
      background: #B83232;
      color: white;
      border-radius: 12px;
      padding: 12px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(184,50,50,0.4);
      cursor: pointer;
      border: none;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    #emergency-logout:hover { background: #9a2828; }
  </style>

  <script>
    // ══════════════════════════════════════════════════════
    // SOLUTION DÉFINITIVE AU BUG D'ONGLET
    // Quand l'onglet revient visible après >30s d'absence,
    // on force un reload complet. Simple, fiable, universel.
    // C'est la même approche que Gmail, Notion, Vercel.
    // ══════════════════════════════════════════════════════
    (function() {
      var hiddenAt = null;
      var RELOAD_THRESHOLD = 30 * 1000; // 30 secondes

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          hiddenAt = Date.now();
        } else if (document.visibilityState === 'visible') {
          if (hiddenAt && (Date.now() - hiddenAt) > RELOAD_THRESHOLD) {
            // L'onglet était caché depuis plus de 30s → reload propre
            console.log('ImmoTrack: tab was hidden for', Math.round((Date.now()-hiddenAt)/1000), 's → reloading');
            window.location.reload();
          }
          hiddenAt = null;
        }
      });

      // ── Bouton de secours natif ──────────────────────────
      // S'affiche si aucune interaction depuis 15s
      // Fonctionne même si React est complètement gelé
      var stuckTimer = null;

      function clearStorage() {
        try {
          Object.keys(localStorage)
            .filter(function(k) {
              return k.indexOf('sb-') === 0 || k.indexOf('supabase') !== -1;
            })
            .forEach(function(k) { localStorage.removeItem(k); });
          sessionStorage.clear();
        } catch(e) {}
      }

      function showEmergency() {
        var btn = document.getElementById('emergency-logout');
        if (btn && window.location.pathname !== '/connexion') {
          btn.style.display = 'block';
        }
      }

      function hideEmergency() {
        var btn = document.getElementById('emergency-logout');
        if (btn) btn.style.display = 'none';
        clearTimeout(stuckTimer);
        if (window.location.pathname !== '/connexion') {
          stuckTimer = setTimeout(showEmergency, 15000);
        }
      }

      // Démarrer après le chargement initial
      document.addEventListener('DOMContentLoaded', function() {
        hideEmergency();
        // Interactions utilisateur = app pas bloquée
        ['click','keydown','touchstart','scroll'].forEach(function(ev) {
          document.addEventListener(ev, hideEmergency, { passive: true });
        });
      });

      // Exposer pour React
      window.__reset_stuck = hideEmergency;
      window.__clear_auth = clearStorage;
    })();
  </script>
</head>
<body>
  <noscript>ImmoTrack nécessite JavaScript.</noscript>
  <div id="root"></div>

  <!-- Bouton de déconnexion d'urgence — pur HTML, sans React -->
  <a id="emergency-logout"
     href="/connexion"
     onclick="window.__clear_auth && window.__clear_auth(); return true;">
    🚪 Déconnecter
  </a>
</body>
</html>
