<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2D5A3D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ImmoTrack</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <script>
    // FIX BFCACHE : reload si la page vient du cache navigateur (bfcache)
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) { window.location.reload(true); }
    });

    // FIX ONGLET : reload seulement si :
    // - caché > 30 secondes (pas pendant la saisie de formulaire)
    // - ET aucun modal ouvert (pas d'élément .modal-overlay visible)
    var _hiddenAt = null;
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'hidden') {
        _hiddenAt = Date.now();
      } else if (document.visibilityState === 'visible') {
        var hidden = _hiddenAt ? (Date.now() - _hiddenAt) : 0;
        _hiddenAt = null;
        if (hidden < 30000) return; // moins de 30s : pas de reload
        // Vérifier qu'aucun modal n'est ouvert
        var modal = document.querySelector('.modal-overlay');
        if (modal && modal.style.display !== 'none') return; // modal ouvert : pas de reload
        window.location.reload(true);
      }
    });

    function _clearAuth() {
      try { Object.keys(localStorage).filter(function(k){return k.indexOf('sb-')===0||k.indexOf('supabase')!==-1;}).forEach(function(k){localStorage.removeItem(k);}); sessionStorage.clear(); } catch(e) {}
    }
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    body { margin:0; font-family:'DM Sans',sans-serif; background:#F7F5F0; }
    #emergency { display:none; position:fixed; bottom:20px; right:16px; z-index:99999; background:#B83232; color:white; border-radius:12px; padding:12px 20px; font-family:sans-serif; font-size:14px; font-weight:600; text-decoration:none; box-shadow:0 4px 20px rgba(184,50,50,.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <a id="emergency" href="/connexion" onclick="_clearAuth&&_clearAuth()">🚪 Se déconnecter</a>
</body>
</html>
