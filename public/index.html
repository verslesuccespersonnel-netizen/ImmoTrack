<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2D5A3D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>ImmoTrack</title>
  <script>
    // ─── FIX BFCACHE (cause réelle du bug d'onglet) ───────────────
    // Quand Chrome/Safari met la page en back-forward cache (bfcache),
    // les fetch() sont gelés indéfiniment. L'événement "pageshow"
    // avec persisted=true est le seul signal fiable.
    // On force un reload → React repart proprement depuis zéro.
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) { window.location.reload(true); }
    });

    // Fallback visibilitychange > 10s pour les navigateurs non-bfcache
    var _hiddenAt = null;
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'hidden') {
        _hiddenAt = Date.now();
      } else if (_hiddenAt && (Date.now() - _hiddenAt) > 10000) {
        window.location.reload(true);
      } else {
        _hiddenAt = null;
      }
    });

    // Bouton d'urgence natif — fonctionne même si JS est gelé
    function _clearAuth() {
      try {
        Object.keys(localStorage)
          .filter(function(k) { return k.indexOf('sb-') === 0 || k.indexOf('supabase') !== -1; })
          .forEach(function(k) { localStorage.removeItem(k); });
        sessionStorage.clear();
      } catch(e) {}
    }
    var _urgencyTimer = null;
    function _resetUrgency() {
      clearTimeout(_urgencyTimer);
      var b = document.getElementById('it-emergency');
      if (b) b.style.display = 'none';
      if (window.location.pathname !== '/connexion') {
        _urgencyTimer = setTimeout(function() {
          var b = document.getElementById('it-emergency');
          if (b) b.style.display = 'flex';
        }, 15000);
      }
    }
    document.addEventListener('DOMContentLoaded', function() {
      _resetUrgency();
      ['click','keydown','touchstart','scroll'].forEach(function(ev) {
        document.addEventListener(ev, _resetUrgency, { passive: true });
      });
    });
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: #F7F5F0; }
    #it-emergency {
      display: none; position: fixed; bottom: 72px; right: 16px; z-index: 99999;
      background: #B83232; color: white; border-radius: 12px; padding: 12px 20px;
      font-family: sans-serif; font-size: 14px; font-weight: 600;
      text-decoration: none; box-shadow: 0 4px 20px rgba(184,50,50,.5);
      align-items: center; gap: 8px; cursor: pointer;
    }
    @media (min-width: 769px) { #it-emergency { bottom: 20px; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <a id="it-emergency" href="/connexion"
     onclick="_clearAuth && _clearAuth()">
    🚪 Se déconnecter
  </a>
</body>
</html>
