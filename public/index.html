<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2D5A3D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ImmoTrack</title>
  <script>
    ;(function() {
      // pageshow persisted = restauration depuis bfcache → reload
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) { window.location.reload(true); }
      });
      // visibilitychange > 10s → reload
      var hiddenAt = null;
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          hiddenAt = Date.now();
        } else if (hiddenAt && (Date.now() - hiddenAt) > 10000) {
          window.location.reload(true);
        } else {
          hiddenAt = null;
        }
      });
      // Bouton urgence
      function clearAuth() {
        try {
          Object.keys(localStorage)
            .filter(function(k){ return k.indexOf('sb-')===0 || k.indexOf('supabase')!==-1; })
            .forEach(function(k){ localStorage.removeItem(k); });
          sessionStorage.clear();
        } catch(e){}
      }
      var t = null;
      function resetUrgency() {
        clearTimeout(t);
        var b = document.getElementById('eb');
        if (b) b.style.display='none';
        if (window.location.pathname !== '/connexion')
          t = setTimeout(function(){ var b=document.getElementById('eb'); if(b) b.style.display='block'; }, 12000);
      }
      document.addEventListener('DOMContentLoaded', function() {
        resetUrgency();
        ['click','keydown','touchstart','scroll'].forEach(function(ev){
          document.addEventListener(ev, resetUrgency, {passive:true});
        });
      });
      window.__itClearAuth = clearAuth;
      window.__itReset = resetUrgency;
    })();
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    #eb {
      display:none; position:fixed; bottom:70px; right:16px; z-index:99999;
      background:#B83232; color:white; border-radius:12px; padding:12px 22px;
      font-family:sans-serif; font-size:14px; font-weight:600;
      text-decoration:none; box-shadow:0 4px 20px rgba(184,50,50,.45); cursor:pointer;
    }
    @media(min-width:769px){ #eb { bottom:20px; } }
  </style>
</head>
<body>
  <noscript>ImmoTrack nécessite JavaScript.</noscript>
  <div id="root"></div>
  <a id="eb" href="/connexion" onclick="window.__itClearAuth&&window.__itClearAuth()">🚪 Se déconnecter</a>
</body>
</html>
