<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2D5A3D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>ImmoTrack</title>
  <script>
    // ═══════════════════════════════════════════════════════════
    // FIX BUG ONGLET — Solution radicale et définitive
    // Quand l'onglet est caché plus de 10s, on force un reload.
    // Les fetch gelés sont ainsi annulés. Même approche que Gmail.
    // ═══════════════════════════════════════════════════════════
    ;(function() {
      var hiddenSince = null;
      var THRESHOLD   = 10000; // 10 secondes

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          hiddenSince = Date.now();
        } else {
          if (hiddenSince !== null && (Date.now() - hiddenSince) >= THRESHOLD) {
            window.location.reload(true);
          }
          hiddenSince = null;
        }
      });

      // ── Bouton d'urgence ──────────────────────────────────────
      // Apparaît si pas d'interaction pendant 12s (app gelée)
      var urgTimer = null;

      function resetUrgency() {
        clearTimeout(urgTimer);
        var btn = document.getElementById('emergency-btn');
        if (btn) btn.classList.remove('visible');
        if (window.location.pathname !== '/connexion') {
          urgTimer = setTimeout(function() {
            var b = document.getElementById('emergency-btn');
            if (b) b.classList.add('visible');
          }, 12000);
        }
      }

      function clearAuth() {
        try {
          Object.keys(localStorage)
            .filter(function(k){ return k.indexOf('sb-')===0 || k.indexOf('supabase')!==-1; })
            .forEach(function(k){ localStorage.removeItem(k); });
          sessionStorage.clear();
        } catch(e){}
      }

      document.addEventListener('DOMContentLoaded', function() {
        resetUrgency();
        ['click','keydown','touchstart','scroll'].forEach(function(ev) {
          document.addEventListener(ev, resetUrgency, { passive: true });
        });
      });

      // API pour React
      window.__itResetUrgency = resetUrgency;
      window.__itClearAuth    = clearAuth;
    })();
  </script>
</head>
<body>
  <noscript>ImmoTrack nécessite JavaScript.</noscript>
  <div id="root"></div>
  <a id="emergency-btn"
     href="/connexion"
     onclick="window.__itClearAuth && window.__itClearAuth()">
    🚪 Se déconnecter
  </a>
</body>
</html>
